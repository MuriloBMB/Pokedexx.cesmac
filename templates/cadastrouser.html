<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Geral.css') }}">
    <title>cadastrouser</title>
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="login-box" style="width: 500px;">
        <form action="/cadastrouser" method="POST">
            <h2 class="text-center mb-3">Faça seu cadastro</h2>
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="Nome" class="form-control" placeholder="nome">
            </div>
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="User" class="form-control" placeholder="user">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="Senha" class="form-control" placeholder="senha">
            </div>
            <button type="submit" class="btn btn-warning w-100 mb-2">
                Cadastrar
            </button>
            <a href="/login" class="btn btn-danger w-100">
                login
            </a>
        </form>
    </div>
</div>
</body>
</html>
